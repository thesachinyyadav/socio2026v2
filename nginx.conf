# Nginx reverse-proxy config for Socio
# Place at: /etc/nginx/sites-available/socio
# Then: ln -s /etc/nginx/sites-available/socio /etc/nginx/sites-enabled/socio
# After editing: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL — managed by Certbot (run: certbot --nginx -d your-domain.com)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Forward real client IP + proto so Next.js middleware and auth callbacks
    # can detect the correct origin
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Increase timeouts for file uploads and slow DB queries
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    client_max_body_size  10M;

    # ── Express API ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Uploaded files served by Express
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── Next.js client ───────────────────────────────────────────────────────
    # HMR websocket (dev only — comment out in production)
    # location /_next/webpack-hmr {
    #     proxy_pass http://127.0.0.1:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Cache Next.js static assets aggressively
        location /_next/static/ {
            proxy_pass http://127.0.0.1:3000;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
